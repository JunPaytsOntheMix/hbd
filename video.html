<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Message for Steffy 🎬</title>
<link rel="stylesheet" href="style.css">
<style>
body { background:#0a100b; color:#f0f5ee; min-height:100vh; padding-top:60px; display:flex; flex-direction:column; align-items:center; }
.nav-bar { background:rgba(10,16,11,.88); border-bottom-color:rgba(122,171,128,.15); }
.nav-links a { color:rgba(184,216,188,.7); }
.nav-links a:hover,.nav-links a.active { color:var(--matcha-light); }
.nav-logo { color:var(--matcha-light); }
.vid-page { max-width:800px; width:100%; padding:3rem 1.5rem 4rem; text-align:center; }
.page-title { font-family:'Petit Formal Script',cursive; font-size:2.6rem; color:var(--matcha-light); text-shadow:0 0 30px rgba(122,171,128,.4); margin-bottom:.3rem; }
.page-sub { font-family:'Cormorant Garamond',serif; font-style:italic; color:var(--matcha); font-size:.92rem; letter-spacing:.16em; opacity:.7; margin-bottom:2.5rem; }
.filmstrip-top, .filmstrip-bot { width:100%; height:32px; position:relative; overflow:hidden; background:#0d160e; margin-bottom:0; }
.filmstrip-top { border-radius:8px 8px 0 0; }
.filmstrip-bot { border-radius:0 0 8px 8px; }
.film-holes { position:absolute; top:50%; transform:translateY(-50%); display:flex; gap:14px; padding:0 10px; }
.film-hole { width:18px; height:18px; border-radius:4px; background:#1a2e1a; border:1px solid #2a4a2a; flex-shrink:0; }
.cinema-frame { position:relative; border-left:12px solid #0d160e; border-right:12px solid #0d160e; background:#050c06; box-shadow:0 0 0 2px #1a2e1a, 0 30px 80px rgba(0,0,0,.8); }

/* Container adjusted for a vertical YouTube Short */
.video-wrap { 
  position:relative; 
  width:100%; 
  aspect-ratio: 9/16; 
  max-width: 380px; 
  margin: 0 auto; 
  background:#050c06; 
  overflow:hidden; 
}

#yt-player { width:100%; height:100%; border:none; display:block; }

.clapper { position:absolute; inset:0; z-index:10; display:flex; align-items:center; justify-content:center; background:#050c06; transition:opacity .8s ease; }
.clapper.done { opacity:0; pointer-events:none; }
.clapper-board { text-align:center; animation:clapperIn .6s cubic-bezier(.2,.8,.3,1) both; }
@keyframes clapperIn { from{opacity:0;transform:scale(.8)} to{opacity:1;transform:scale(1)} }
.clapper-text { font-family:'Cormorant Garamond',serif; font-size:1.4rem; color:var(--matcha-light); letter-spacing:.2em; font-style:italic; }
.clapper-icon { font-size:3rem; animation:clapperBounce .4s ease .6s both; }
@keyframes clapperBounce { 0%,100% { transform:rotate(0deg); } 50% { transform:rotate(-20deg); } }

.scene-title { position:absolute; bottom:2rem; left:0; right:0; text-align:center; z-index:5; pointer-events:none; opacity:0; transition:opacity .5s; }
.scene-title.show { opacity:1; }
.scene-title-text { font-family:'Petit Formal Script',cursive; font-size:1.4rem; color:rgba(255,255,255,.85); text-shadow:0 2px 12px rgba(0,0,0,.8); }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-trail"></div>

<nav class="nav-bar">
  <a class="nav-logo" href="index.html">Steffy 💚</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="dukebox.html">Jukebox</a>
    <a href="giftbox.html">Gift</a>
    <a href="flower.html">Flowers</a>
    <a href="video.html">Video</a>
    <a href="letter.html">Letter</a>
  </div>
</nav>

<main class="vid-page">
  <h1 class="page-title">A Message for You 🎬</h1>
  <p class="page-sub">recorded from the heart</p>

  <div class="filmstrip-top"><div class="film-holes" id="film-top"></div></div>

  <div class="cinema-frame">
    <div class="video-wrap" id="video-wrap">
      <div class="clapper" id="clapper">
        <div class="clapper-board">
          <div class="clapper-icon">🎬</div>
          <div class="clapper-text">for Steffy,<br>with love</div>
        </div>
      </div>

      <iframe id="yt-player" 
        src="https://www.youtube.com/embed/D-Gk0Vx-GgA?autoplay=1&rel=0&modestbranding=1" 
        allow="autoplay; encrypted-media" allowfullscreen>
      </iframe>

      <div class="scene-title" id="scene-title">
        <div class="scene-title-text" id="scene-title-text">Happy Birthday, Steffy 💚</div>
      </div>
    </div>
  </div>

  <div class="filmstrip-bot"><div class="film-holes" id="film-bot"></div></div>
</main>

<script src="script.js"></script>
<script>
['film-top','film-bot'].forEach(id=>{
  const g = document.getElementById(id);
  if(g) {
    for(let i=0;i<24;i++){
      const h=document.createElement('div'); h.className='film-hole'; g.appendChild(h);
    }
  }
});

setTimeout(() => {
  const el = document.getElementById('scene-title');
  if(el) el.classList.add('show');
  setTimeout(() => { if(el) el.classList.remove('show'); }, 4000);
}, 2500);

setTimeout(() => {
  const clapper = document.getElementById('clapper');
  if(clapper) clapper.classList.add('done');
}, 2000);
</script>
</body>
</html>
