<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flowers for Steffy 🌸</title>
<link rel="stylesheet" href="style.css">
<style>
body { background:radial-gradient(ellipse at 50% 60%, #c8e4c8 0%, #dceedd 45%, #f0f5ee 100%); min-height:100vh; padding-top:60px; overflow:hidden; }

.flower-page { display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 60px);position:relative; }

.page-title { font-family:'Petit Formal Script',cursive; font-size:2.4rem; color:var(--matcha-deep); text-shadow:0 2px 16px rgba(46,92,56,.2); z-index:20; position:relative; text-align:center; }
.page-sub { font-family:'Cormorant Garamond',serif; font-style:italic; color:var(--matcha); font-size:.9rem; letter-spacing:.15em; opacity:.7; margin-bottom:1.5rem; z-index:20; position:relative; }

.bouquet-wrap { position:relative; z-index:10; filter:drop-shadow(0 20px 40px rgba(46,92,56,.2)); cursor:pointer; }

.bouquet-bob { animation:bouquetBob 3s ease-in-out infinite; }
@keyframes bouquetBob {
  0%,100% { transform:translateY(0) rotate(-.5deg); }
  50%     { transform:translateY(-10px) rotate(.5deg); }
}

.petal-fly { position:fixed;pointer-events:none;font-size:1.2rem;z-index:99; animation:petalFly 1.2s ease forwards; }
@keyframes petalFly {
  from { opacity:1;transform:translate(0,0) scale(1) rotate(0deg); }
  to   { opacity:0;transform:translate(var(--tx),var(--ty)) scale(.4) rotate(var(--rot)); }
}

.petal-rain { position:fixed;pointer-events:none;z-index:1;font-size:1rem; animation:petalRain linear infinite;opacity:0; }
@keyframes petalRain {
  0%   { transform:translateY(-20px) rotate(0deg); opacity:0; }
  8%   { opacity:.8; }
  92%  { opacity:.6; }
  100% { transform:translateY(110vh) rotate(360deg); opacity:0; }
}

.flower-msg {
  max-width:340px; text-align:center; padding:1.5rem 2rem;
  margin-top:2rem; z-index:20; position:relative;
  background:rgba(255,255,255,.55); backdrop-filter:blur(12px);
  border:1px solid rgba(122,171,128,.4); border-radius:16px;
  box-shadow:0 8px 30px rgba(46,92,56,.12);
  animation:msgRise .8s cubic-bezier(.2,.8,.3,1) .4s both;
}
@keyframes msgRise { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
.flower-msg-text { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.05rem; color:var(--matcha-deep); line-height:1.7; }
.flower-msg-sig { font-family:'Petit Formal Script',cursive; font-size:1.1rem; color:var(--matcha-dark); margin-top:.6rem; }

.click-hint { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:.78rem; color:var(--matcha-dark); opacity:.5; margin-top:.8rem; z-index:20; animation:hintBlink 2.5s ease-in-out infinite; }
@keyframes hintBlink { 0%,100%{opacity:.3} 50%{opacity:.7} }

/* ── Flower sway animation ── */
/* Each flower group is wrapped in a <g class="flower-group"> with its own swaying <animateTransform> */
</style>
</head>

<script src="script.js"></script>
<script>
const PETALS = ['🌸','💚','✿','🍃','🌱'];
function spawnPetalRain() {
  const el = document.createElement('div');
  el.className = 'petal-rain';
  el.textContent = PETALS[Math.floor(Math.random()*PETALS.length)];
  el.style.left = Math.random()*100+'vw';
  el.style.fontSize = (.7+Math.random()*.6)+'rem';
  const dur = 8+Math.random()*8;
  el.style.animationDuration = dur+'s';
  el.style.animationDelay = Math.random()*4+'s';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),(dur+5)*1000);
}
for(let i=0;i<10;i++) spawnPetalRain();
setInterval(spawnPetalRain, 3000);

function bloomBurst(e) {
  document.getElementById('click-hint').style.opacity='0';
  const BURST = ['🌸','💚','✦','✿','🌱','⋆','🍃'];
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'petal-fly';
    p.textContent = BURST[Math.floor(Math.random()*BURST.length)];
    const angle = (i/22)*Math.PI*2;
    const dist = 70+Math.random()*130;
    p.style.cssText = `
      position:fixed;
      left:${e.clientX}px; top:${e.clientY}px;
      --tx:${Math.cos(angle)*dist}px;
      --ty:${Math.sin(angle)*dist}px;
      --rot:${(Math.random()-.5)*360}deg;
      font-size:${.8+Math.random()*.8}rem;
      animation-duration:${.8+Math.random()*.6}s;
      pointer-events:none; z-index:99;
    `;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1500);
  }
}
</script>
