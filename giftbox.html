<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Gift for Steffy 🎁</title>
<link rel="stylesheet" href="style.css">
<style>
body { background:radial-gradient(ellipse at 50% 45%, #cde8ce 0%, #ddf0de 40%, #f0f5ee 100%); min-height:100vh; padding-top:60px; display:flex; flex-direction:column; align-items:center; }
.gift-page { width:100%; max-width:700px; padding:3rem 1.5rem 4rem; text-align:center; }
.page-title { font-family:'Petit Formal Script',cursive; font-size:2.4rem; color:var(--matcha-deep); margin-bottom:.3rem; }
.page-sub { font-family:'Cormorant Garamond',serif; font-style:italic; color:var(--matcha); font-size:.9rem; letter-spacing:.15em; opacity:.7; margin-bottom:3rem; }

/* ── GIFT BOX ── */
.gift-scene { position:relative; display:inline-block; cursor:pointer; margin-bottom:1rem; }
.gift-box { width:200px; height:200px; position:relative; margin:0 auto; transform-style:preserve-3d; transition:transform .3s; }
.box-body { position:absolute; bottom:0; left:0; width:200px; height:160px; background:linear-gradient(160deg, #a8d4ac, #7aab80, #5a9060); border-radius:8px 8px 12px 12px; box-shadow:0 8px 30px rgba(46,92,56,.3), inset 0 1px 0 rgba(255,255,255,.4); }
.box-body::before { content:''; position:absolute; left:0; right:0; top:50%; height:22px; background:linear-gradient(180deg,rgba(255,255,255,.6),rgba(255,255,255,.3)); transform:translateY(-50%); }
.box-body::after { content:''; position:absolute; top:0; bottom:0; left:50%; width:22px; background:linear-gradient(90deg,rgba(255,255,255,.6),rgba(255,255,255,.3)); transform:translateX(-50%); }
.box-lid { position:absolute; top:0; left:-8px; width:216px; height:56px; background:linear-gradient(160deg, #c8e8c4, #8ab890, #6a9e70); border-radius:10px; box-shadow:0 4px 14px rgba(46,92,56,.25), inset 0 1px 0 rgba(255,255,255,.5); transform-origin:center top; transition:transform .8s cubic-bezier(.2,.8,.3,1); z-index:10; }
.box-lid::after { content:''; position:absolute; top:0; bottom:0; left:50%; width:22px; background:linear-gradient(90deg,rgba(255,255,255,.6),rgba(255,255,255,.3)); transform:translateX(-50%); }
.bow { position:absolute; top:-26px; left:50%; transform:translateX(-50%); width:60px; height:30px; z-index:11; transition:transform .8s cubic-bezier(.2,.8,.3,1), opacity .5s; }
.bow-left, .bow-right { position:absolute; width:26px; height:22px; background:radial-gradient(circle at 40% 40%, #e8d090, #c8a84b); border-radius:50% 50% 0 50%; top:0; }
.bow-left  { left:2px; transform:rotate(-40deg); }
.bow-right { right:2px; transform:rotate(40deg) scaleX(-1); }
.bow-center { position:absolute; width:14px; height:14px; border-radius:50%; background:radial-gradient(circle at 40% 40%, #ffe8a0, #c8a84b); top:6px; left:50%; transform:translateX(-50%); box-shadow:0 2px 6px rgba(0,0,0,.2); }
.gift-scene.opened .box-lid { transform: rotateX(-130deg) translateY(-10px); }
.gift-scene.opened .bow { transform: translateX(-50%) translateY(-40px) rotate(-15deg); opacity: 0; }
.box-inside { position:absolute; bottom:0; left:0; width:200px; height:150px; background:linear-gradient(180deg,rgba(255,255,220,.6) 0%,rgba(255,255,255,.1) 100%); border-radius:8px 8px 12px 12px; opacity:0; transition:opacity .5s ease .4s; }
.gift-scene.opened .box-inside { opacity:1; }
.tap-hint { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:.85rem; color:var(--matcha-dark); letter-spacing:.14em; margin-top:1rem; opacity:.6; animation:hintBlink 2s ease-in-out infinite; }
@keyframes hintBlink { 0%,100%{opacity:.4} 50%{opacity:.9} }

/* ── ALBUM ── */
.album-reveal { opacity:0; transform:translateY(30px) scale(.97); transition:opacity .8s ease .3s, transform .8s ease .3s; pointer-events:none; }
.album-reveal.show { opacity:1; transform:none; pointer-events:all; }
.album-heading { font-family:'Petit Formal Script',cursive; font-size:2rem; color:var(--matcha-deep); margin-bottom:.3rem; text-shadow:0 2px 12px rgba(46,92,56,.15); }
.album-sub { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:.85rem; color:var(--matcha); letter-spacing:.14em; margin-bottom:1.8rem; opacity:.65; }
.polaroid-grid { display:flex; flex-wrap:wrap; gap:1.2rem; justify-content:center; }
.polaroid { background:#fefefe; padding:10px 10px 36px; position:relative; box-shadow:0 6px 24px rgba(0,0,0,.22), 0 2px 6px rgba(0,0,0,.1); transition:transform .35s ease, box-shadow .35s; width:155px; animation:pdrop .5s cubic-bezier(.2,.8,.3,1) both; }
.polaroid:nth-child(odd)  { transform:rotate(-2.2deg); }
.polaroid:nth-child(even) { transform:rotate(1.8deg); }
.polaroid:hover { transform:rotate(0) scale(1.07) translateY(-6px) !important; box-shadow:0 20px 50px rgba(0,0,0,.3),0 0 0 2px var(--gold); z-index:20; }
.polaroid.hero { width:195px;padding:12px 12px 46px;border:2px solid var(--gold);box-shadow:0 8px 30px rgba(0,0,0,.25),0 0 20px rgba(200,168,75,.25); }
.polaroid.hero::after { content:'⭐ favourite';position:absolute;top:-11px;right:-11px;background:var(--gold);color:#1e2e1a;font-family:'Raleway',sans-serif;font-size:.48rem;font-weight:400;letter-spacing:.14em;text-transform:uppercase;padding:3px 8px;border-radius:20px;white-space:nowrap; }
.polaroid::before { content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:44px;height:16px;background:rgba(200,220,190,.5);border-radius:2px;z-index:5; }
@keyframes pdrop { from{opacity:0;transform:translateY(-20px) scale(.9)} to{opacity:1} }
.p-img { width:100%;aspect-ratio:1;position:relative;overflow:hidden;background:linear-gradient(135deg,#d8ead0,#b8d4b0); }
.p-img img { width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in; }
.p-cap { position:absolute;bottom:8px;left:0;right:0;text-align:center;font-family:'Petit Formal Script',cursive;font-size:.82rem;color:#3a5040;pointer-events:none; }

/* ── LIGHTBOX ── */
#lb { position:fixed;inset:0;background:rgba(4,12,4,.94);z-index:200;display:none;align-items:center;justify-content:center;padding:2rem;cursor:pointer; }
#lb.open { display:flex;animation:fadeIn .3s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
#lb-box { background:#fefefe;padding:14px 14px 52px;max-width:min(480px,90vw);box-shadow:0 30px 80px rgba(0,0,0,.7);position:relative;cursor:default;animation:lbpop .3s cubic-bezier(.2,.8,.3,1); }
@keyframes lbpop { from{transform:scale(.85)} to{transform:scale(1)} }
#lb-img { width:100%;max-height:65vh;object-fit:contain;display:block; }
#lb-cap { text-align:center;font-family:'Petit Formal Script',cursive;font-size:1.2rem;color:#3a5040;margin-top:10px; }
#lb-close { position:absolute;top:-14px;right:-14px;background:#3a6040;border:none;color:#f4f9f0;font-size:1rem;width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center; }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-trail"></div>

<nav class="nav-bar">
  <a class="nav-logo" href="index.html">Steffy 💚</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="dukebox.html">Jukebox</a>
    <a href="giftbox.html">Gift</a>
    <a href="flower.html">Flowers</a>
    <a href="video.html">Video</a>
    <a href="letter.html">Letter</a>
  </div>
</nav>

<div id="lb" onclick="closeLB(event)">
  <div id="lb-box" onclick="event.stopPropagation()">
    <button id="lb-close" onclick="closeLB()">✕</button>
    <img id="lb-img" src="" alt="">
    <p id="lb-cap"></p>
  </div>
</div>

<main class="gift-page">
  <h1 class="page-title">A Gift for You 🎁</h1>
  <p class="page-sub">tap the gift to open it</p>

  <div class="gift-scene" id="gift-scene" onclick="openGift()">
    <div class="gift-box">
      <div class="bow">
        <div class="bow-left"></div>
        <div class="bow-right"></div>
        <div class="bow-center"></div>
      </div>
      <div class="box-lid"></div>
      <div class="box-body"></div>
      <div class="box-inside"></div>
    </div>
    <p class="tap-hint" id="tap-hint">✦ tap to unwrap ✦</p>
  </div>

  <div class="album-reveal" id="album-reveal">
    <div class="album-heading">MY BABY💚</div>
    <p class="album-sub">MY GORGEOUS STEFFY</p>
    <div class="polaroid-grid" id="polaroid-grid"></div>
  </div>
</main>

<script src="script.js"></script>

<script>
// ── DATA ──────────────────────────────────────────────
const polaroidData = [
  {src:'pic1.jpg', caption:'💚',        hero:true},
  {src:'pic2.jpg', caption:'💚',    hero:false},
  {src:'pic3.jpg', caption:'💚',  hero:false},
  {src:'pic4.jpg', caption:'💚',  hero:false},
  {src:'pic5.jpg', caption:'💚',   hero:false},
  {src:'pic6.jpg', caption:'💚', hero:false},
  {src:'pic7.jpg', caption:'💚',     hero:false},
  {src:'pic8.jpg', caption:'💚',    hero:false},
];

let giftOpened = false;

function openGift() {
  if (giftOpened) return;
  giftOpened = true;

  const scene = document.getElementById('gift-scene');
  const hint  = document.getElementById('tap-hint');
  const album = document.getElementById('album-reveal');

  scene.classList.add('opened');
  hint.style.opacity = '0';

  // Sparkles
  for (let i = 0; i < 18; i++) {
    setTimeout(() => {
      const sp = document.createElement('div');
      const rect = scene.getBoundingClientRect();
      sp.style.cssText = `
        position:fixed;z-index:99;pointer-events:none;
        left:${rect.left+rect.width/2}px;top:${rect.top+rect.height/2}px;
        font-size:${.8+Math.random()*.8}rem;
        animation:sparkOut .8s ease forwards;
        --tx:${(Math.random()-.5)*160}px;--ty:${(Math.random()-.5)*120}px;
      `;
      sp.textContent = ['💚','✦','✿','🌸','⋆'][Math.floor(Math.random()*5)];
      document.body.appendChild(sp);
      setTimeout(()=>sp.remove(),900);
    }, i * 40);
  }

  setTimeout(() => {
    buildPolaroids();
    album.classList.add('show');
    scene.style.cursor = 'default';
  }, 900);
}

function buildPolaroids() {
  const grid = document.getElementById('polaroid-grid');
  grid.innerHTML = '';
  polaroidData.forEach((pol, idx) => {
    const div = document.createElement('div');
    div.className = 'polaroid' + (pol.hero ? ' hero' : '');
    div.style.animationDelay = (idx * .08) + 's';

    const wrap = document.createElement('div');
    wrap.className = 'p-img';

    const img = document.createElement('img');
    img.src = pol.src; 
    img.alt = pol.caption;
    img.onclick = () => openLB(pol.src, pol.caption);
    
    img.onerror = function() {
        this.parentElement.style.background = '#d8ead0';
        this.style.opacity = '0';
    };

    wrap.appendChild(img);
    const cap = document.createElement('p');
    cap.className = 'p-cap'; 
    cap.textContent = pol.caption;
    
    div.appendChild(wrap); 
    div.appendChild(cap);
    grid.appendChild(div);
  });
}

function openLB(src, cap) {
  document.getElementById('lb-img').src = src;
  document.getElementById('lb-cap').textContent = cap;
  document.getElementById('lb').classList.add('open');
}

function closeLB(e) {
  if (!e || e.target === document.getElementById('lb') || e.target.id === 'lb-close') {
    document.getElementById('lb').classList.remove('open');
  }
}
</script>

<style>
@keyframes sparkOut {
  from { opacity:1; transform:translate(0,0) scale(1); }
  to   { opacity:0; transform:translate(var(--tx),var(--ty)) scale(.3); }
}
</style>
</body>
</html>
